name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  target: x86_64-unknown-linux-gnu,    ext: ""      }
          - { os: ubuntu-latest,  target: aarch64-unknown-linux-gnu,   ext: ""      }
          - { os: macos-latest,   target: x86_64-apple-darwin,         ext: ""      }
          - { os: macos-latest,   target: aarch64-apple-darwin,        ext: ""      }
          - { os: windows-latest, target: x86_64-pc-windows-msvc,      ext: ".exe"  }
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install cross (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: cargo install cross --git https://github.com/cross-rs/cross
      - uses: Swatinem/rust-cache@v2
      - name: Build
        shell: bash
        run: |
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi
      - name: Package
        shell: bash
        run: |
          set -e
          name="cy-tls-${GITHUB_REF_NAME}-${{ matrix.target }}"
          mkdir -p dist
          cp target/${{ matrix.target }}/release/cy-tls${{ matrix.ext }} dist/
          cp README.md LICENSE dist/
          cd dist
          if [ "${{ matrix.ext }}" = ".exe" ]; then
            7z a "${name}.zip" cy-tls.exe README.md LICENSE
          else
            tar czf "${name}.tar.gz" cy-tls README.md LICENSE
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: dist/*.tar.gz
          if-no-files-found: ignore
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}-zip
          path: dist/*.zip
          if-no-files-found: ignore

  publish:
    name: publish
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
