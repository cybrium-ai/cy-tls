name: release

# Mirrors the cyweb release pattern:
#   - 5 platforms (linux x64 + arm64, darwin x64 + arm64, windows x64)
#   - Raw binary uploads named cy-tls-<os>-<arch>[.exe]
#   - Apple code signing + notarization (when secrets present)
#   - Azure Trusted Signing for Windows (when secrets present, via OIDC)
#   - Auto-update Homebrew formula + Scoop manifest (when HOMEBREW_TAP_TOKEN present)
#
# Required secrets for full signing (copy from cybrium-ai/cyweb via STDIN):
#   APPLE_CERTIFICATE_BASE64   APPLE_CERTIFICATE_PASSWORD   APPLE_SIGNING_IDENTITY
#   APPLE_ID                   APPLE_APP_PASSWORD           APPLE_TEAM_ID
#   AZURE_CLIENT_ID            AZURE_TENANT_ID
#   HOMEBREW_TAP_TOKEN
#
# All signing + tap-update steps guard on $VAR being non-empty INSIDE the
# shell, because `if:` is evaluated before the step's `env:` block expands
# secrets — so `if: env.X != ''` does not work for secret presence checks.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write
  id-token: write    # OIDC federated token for Azure Trusted Signing

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os:     ubuntu-latest
            name:   cy-tls-linux-amd64
            sign:   false
          - target: aarch64-unknown-linux-gnu
            os:     ubuntu-24.04-arm
            name:   cy-tls-linux-arm64
            sign:   false
          - target: x86_64-apple-darwin
            os:     macos-14
            name:   cy-tls-darwin-amd64
            sign:   true
          - target: aarch64-apple-darwin
            os:     macos-14
            name:   cy-tls-darwin-arm64
            sign:   true
          - target: x86_64-pc-windows-msvc
            os:     windows-latest
            name:   cy-tls-windows-amd64.exe
            sign:   false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Build
        shell: bash
        run: cargo build --release --target ${{ matrix.target }}

      - name: Stage binary
        shell: bash
        run: |
          mkdir -p dist
          if [[ "${{ matrix.name }}" == *.exe ]]; then
            cp target/${{ matrix.target }}/release/cy-tls.exe dist/${{ matrix.name }}
          else
            cp target/${{ matrix.target }}/release/cy-tls    dist/${{ matrix.name }}
          fi
          ls -la dist

      # ── Apple code signing — guarded in-shell on secret presence ────
      - name: Import Apple signing certificate (if configured)
        if: matrix.sign
        env:
          APPLE_CERTIFICATE_BASE64:   ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        shell: bash
        run: |
          if [ -z "$APPLE_CERTIFICATE_BASE64" ]; then
            echo "APPLE_CERTIFICATE_BASE64 not set — skipping cert import"
            exit 0
          fi
          CERT_PATH=$RUNNER_TEMP/cert.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -hex 16)
          echo -n "$APPLE_CERTIFICATE_BASE64" | base64 --decode -o "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

      - name: Sign macOS binary (if configured)
        if: matrix.sign
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        shell: bash
        run: |
          if [ -z "$APPLE_SIGNING_IDENTITY" ]; then
            echo "APPLE_SIGNING_IDENTITY not set — emitting unsigned binary"
            exit 0
          fi
          codesign --force --options runtime --timestamp \
            --sign "$APPLE_SIGNING_IDENTITY" \
            dist/${{ matrix.name }}
          codesign --verify --verbose=2 dist/${{ matrix.name }}

      - name: Notarize macOS binary (if configured)
        if: matrix.sign
        env:
          APPLE_ID:           ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID:      ${{ secrets.APPLE_TEAM_ID }}
        shell: bash
        run: |
          if [ -z "$APPLE_ID" ]; then
            echo "APPLE_ID not set — skipping notarization"
            exit 0
          fi
          ditto -c -k --keepParent dist/${{ matrix.name }} /tmp/${{ matrix.name }}.zip
          xcrun notarytool submit /tmp/${{ matrix.name }}.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id  "$APPLE_TEAM_ID" \
            --wait

      # ── Azure Trusted Signing for Windows ───────────────────────────
      # azure/login DOES allow `if:` checks because we can route the
      # client-id through a job-scope env to keep the if-expression honest.
      # We use a separate guard step to short-circuit Windows signing when
      # AZURE_CLIENT_ID is absent.
      - name: Check Windows signing eligibility
        id: winsign
        if: runner.os == 'Windows' && startsWith(github.ref, 'refs/tags/v')
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
        shell: bash
        run: |
          if [ -z "$AZURE_CLIENT_ID" ]; then
            echo "AZURE_CLIENT_ID not set — emitting unsigned Windows binary"
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Azure login (federated OIDC)
        if: steps.winsign.outputs.enabled == 'true'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Sign Windows binary via Azure Trusted Signing
        if: steps.winsign.outputs.enabled == 'true'
        uses: Azure/trusted-signing-action@v0.5
        with:
          azure-tenant-id:              ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id:              ${{ secrets.AZURE_CLIENT_ID }}
          endpoint:                     https://cus.codesigning.azure.net/
          trusted-signing-account-name: cybrium-signing
          certificate-profile-name:     cybrium
          files-folder:                 dist
          files-folder-filter:          exe
          file-digest:                  SHA256
          timestamp-rfc3161:            http://timestamp.acs.microsoft.com
          timestamp-digest:             SHA256

      - name: Verify Windows signature
        if: steps.winsign.outputs.enabled == 'true'
        shell: pwsh
        run: |
          $sig = Get-AuthenticodeSignature dist/${{ matrix.name }}
          Write-Host "Status: $($sig.Status)"
          Write-Host "Signer: $($sig.SignerCertificate.Subject)"
          if ($sig.Status -ne 'Valid') { throw "Signature verification failed: $($sig.Status)" }

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: dist/${{ matrix.name }}
          if-no-files-found: error

  publish:
    name: publish (release + Homebrew + Scoop)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

      - name: Update Homebrew formula (if HOMEBREW_TAP_TOKEN set)
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION_TAG: ${{ github.ref_name }}
        shell: bash
        run: |
          if [ -z "$HOMEBREW_TAP_TOKEN" ]; then
            echo "HOMEBREW_TAP_TOKEN not set — skipping formula update"
            exit 0
          fi
          if [[ ! "$VERSION_TAG" =~ ^v ]]; then
            echo "Not a tag push — skipping formula update"
            exit 0
          fi
          VERSION="${VERSION_TAG#v}"
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/cybrium-ai/homebrew-cli.git" tap
          cd tap

          DARWIN_ARM=$(cd ../dist && sha256sum cy-tls-darwin-arm64 | awk '{print $1}')
          DARWIN_X64=$(cd ../dist && sha256sum cy-tls-darwin-amd64 | awk '{print $1}')
          LINUX_ARM=$(cd ../dist  && sha256sum cy-tls-linux-arm64  | awk '{print $1}')
          LINUX_X64=$(cd ../dist  && sha256sum cy-tls-linux-amd64  | awk '{print $1}')

          cat > Formula/cy-tls.rb <<EOF
          class CyTls < Formula
            desc     "Cybrium SSL/TLS posture scanner — full probe suite, HSTS preload lookup"
            homepage "https://github.com/cybrium-ai/cy-tls"
            license  "Apache-2.0"
            version  "${VERSION}"

            on_macos do
              on_arm do
                url    "https://github.com/cybrium-ai/cy-tls/releases/download/${VERSION_TAG}/cy-tls-darwin-arm64"
                sha256 "${DARWIN_ARM}"
              end
              on_intel do
                url    "https://github.com/cybrium-ai/cy-tls/releases/download/${VERSION_TAG}/cy-tls-darwin-amd64"
                sha256 "${DARWIN_X64}"
              end
            end

            on_linux do
              on_arm do
                url    "https://github.com/cybrium-ai/cy-tls/releases/download/${VERSION_TAG}/cy-tls-linux-arm64"
                sha256 "${LINUX_ARM}"
              end
              on_intel do
                url    "https://github.com/cybrium-ai/cy-tls/releases/download/${VERSION_TAG}/cy-tls-linux-amd64"
                sha256 "${LINUX_X64}"
              end
            end

            def install
              if OS.mac? && Hardware::CPU.arm?
                bin.install "cy-tls-darwin-arm64" => "cy-tls"
              elsif OS.mac? && Hardware::CPU.intel?
                bin.install "cy-tls-darwin-amd64" => "cy-tls"
              elsif OS.linux? && Hardware::CPU.arm?
                bin.install "cy-tls-linux-arm64"  => "cy-tls"
              else
                bin.install "cy-tls-linux-amd64"  => "cy-tls"
              end
            end

            test do
              assert_match "cy-tls", shell_output("#{bin}/cy-tls --version")
            end
          end
          EOF

          git config user.email "release@cybrium.ai"
          git config user.name  "Cybrium Release Bot"
          git add Formula/cy-tls.rb
          git commit -m "cy-tls ${VERSION} — automated update from release pipeline" || echo "no changes"
          git push origin main

      - name: Update Scoop manifest (if HOMEBREW_TAP_TOKEN set)
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION_TAG: ${{ github.ref_name }}
        shell: bash
        run: |
          if [ -z "$HOMEBREW_TAP_TOKEN" ]; then
            echo "HOMEBREW_TAP_TOKEN not set — skipping Scoop update"
            exit 0
          fi
          if [[ ! "$VERSION_TAG" =~ ^v ]]; then
            echo "Not a tag push — skipping Scoop update"
            exit 0
          fi
          VERSION="${VERSION_TAG#v}"
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/cybrium-ai/scoop-bucket.git" scoop
          cd scoop

          WIN_SHA=$(cd ../dist && sha256sum cy-tls-windows-amd64.exe | awk '{print $1}')

          cat > bucket/cy-tls.json <<EOF
          {
            "version": "${VERSION}",
            "description": "Cybrium cy-tls — signed Windows SSL/TLS posture scanner",
            "homepage": "https://github.com/cybrium-ai/cy-tls",
            "license": "Apache-2.0",
            "url": "https://github.com/cybrium-ai/cy-tls/releases/download/${VERSION_TAG}/cy-tls-windows-amd64.exe",
            "hash": "sha256:${WIN_SHA}",
            "bin": [["cy-tls-windows-amd64.exe", "cy-tls"]],
            "checkver": "github",
            "autoupdate": {
              "url": "https://github.com/cybrium-ai/cy-tls/releases/download/v\$version/cy-tls-windows-amd64.exe"
            }
          }
          EOF

          git config user.email "release@cybrium.ai"
          git config user.name  "Cybrium Release Bot"
          git add bucket/cy-tls.json
          git commit -m "cy-tls ${VERSION} — automated update from release pipeline" || echo "no changes"
          git push origin main
